<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakar Infra Weighbridge Portal</title>
</head>

<body>

<div class="wrapper">

    <div class="header">
        <h1>🚚 Sakar Infra Weighbridge Portal 🚧</h1>
        <p>Dashboard</p>

        <button class="logout-btn" onclick="location.reload()">
            🔄 Refresh
        </button>
    </div>

    <div class="card">
        <h2>🔊 Audio Control Panel</h2>

        <button class="green" onclick="playAudio('vajan_sahi')">
            Vajan Sahi Hai
        </button>

        <button class="red" onclick="playAudio('galat')">
            Vajan Galat Hai
        </button>

        <button class="blue" onclick="playAudio('site_band')">
            Site Nahi Chal Rahi – Gaadi Piche Karein
        </button>
<button class="green" onclick="playAudio('forward')">🚛 Gaadi Aage Lao</button>
<button class="blue" onclick="playAudio('backward')">🚛 Gaadi Piche Lao</button>
        <br>

        <button class="gray" onclick="pauseAudio()">⏸ Pause</button>
        <button class="red" onclick="stopAudio()">⛔ Stop</button>
        

        <p>
            <b>Keyboard Shortcuts:</b>
            1 = Sahi | 2 = Galat | 3 = Site Band | 0 = Stop
        </p>
    </div>

    <div class="card">

        <h2>⚖ Weight Software</h2>

        <div id="weightDisplay">
            Weight: 0 kg
        </div>

        <input
            type="range"
            min="0"
            max="150"
            value="0"
            id="weightSlider"
            style="width:100%;"
        >

        <br><br>

        <button class="blue" id="addRecordBtn">
            Add Record
        </button>

        <button class="green" id="printSlipBtn">
            Print Weight Slip
        </button>

        <table id="recordTable">
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Date & Time</th>
                    <th>Weight (kg)</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

    </div>

    <div class="footer">
        © 2026 Sakar Infra | All Rights Reserved
    </div>

</div>

<audio id="vajan_sahi" src="vajan_sahi_age.mp3.mpeg"></audio>
<audio id="galat" src="galat.mp3.mp3"></audio>
    <audio id="forward" src="forward.wav"></audio>
<audio id="backward" src="backward.wav"></audio>
<audio id="site_band" src="site_nahi_chal_rhi.mp3"></audio>

</body>
</html>
