<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sakar Infra Weighbridge Portal</title>
<style>
body{font-family:Arial; background:#f0f0f0; padding:20px;}
h1{color:#006400;}
label{display:inline-block;width:120px;}
input{margin-bottom:10px;}
button{margin:5px; padding:8px 15px;}
#weightDisplay{font-size:24px; font-weight:bold; color:red;}
table{border-collapse:collapse;width:100%; margin-top:10px;}
th,td{border:1px solid #aaa; padding:5px;}
#cameraPreview{width:300px; height:200px; border:1px solid #333; margin-top:10px;}
@media print{ body{width:148mm; height:210mm;}}
</style>
</head>
<body>

<h1>🚚 Sakar Infra Weighbridge</h1>

<div>
<label>Vehicle No:</label>
<input type="text" id="vehicleNo"><br>

<label>Gross Weight:</label>
<span id="weightDisplay">0 kg</span><br>

<label>Tare Weight:</label>
<input type="number" id="tareWeight" value="0"><br>

<label>Net Weight:</label>
<span id="netWeight">0 kg</span><br>

<button id="saveBtn">Save Record</button>
<button id="printBtn">Print Slip</button>
</div>

<h3>Live Camera Preview</h3>
<img id="cameraPreview" src="rtsp://admin:User%402025@192.168.0.2:554/cam/realmonitor?channel=1&subtype=0" alt="Camera">

<h3>Records</h3>
<table id="recordTable">
<thead><tr>
<th>S.No</th><th>Date & Time</th><th>Vehicle</th><th>Gross</th><th>Tare</th><th>Net</th>
</tr></thead>
<tbody></tbody>
</table>

<script>
// ---------- Real-time Weight ----------
let grossWeight = 0;
const weightDisplay = document.getElementById("weightDisplay");
const netDisplay = document.getElementById("netWeight");
const tareInput = document.getElementById("tareWeight");

function fetchWeight(){
    fetch("http://localhost:5000/weight")
    .then(r=>r.json())
    .then(data=>{
        grossWeight = parseFloat(data.weight.toFixed(2));
        weightDisplay.textContent = grossWeight + " kg";
        updateNet();
    }).catch(e=>console.log(e));
}
setInterval(fetchWeight, 1000);

// ---------- Net Weight ----------
function updateNet(){
    let tare = parseFloat(tareInput.value) || 0;
    let net = grossWeight - tare;
    if(net<0) net=0;
    netDisplay.textContent = net.toFixed(2) + " kg";
}
tareInput.addEventListener("input", updateNet);

// ---------- Save Record ----------
let serial=1;
const recordTable = document.querySelector("#recordTable tbody");
document.getElementById("saveBtn").addEventListener("click", ()=>{
    const vehicle = document.getElementById("vehicleNo").value.trim();
    const tare = parseFloat(tareInput.value)||0;
    const net = grossWeight - tare;
    const now = new Date().toLocaleString();

    if(!vehicle){ alert("Enter Vehicle No"); return; }

    fetch("http://localhost:5000/save",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({vehicle_no:vehicle,gross:grossWeight,tare: tare, net: net, datetime: now})
    }).then(r=>r.json()).then(res=>{
        if(res.status==="success"){
            let row=document.createElement("tr");
            row.innerHTML=`<td>${serial++}</td><td>${now}</td><td>${vehicle}</td><td>${grossWeight}</td><td>${tare}</td><td>${net}</td>`;
            recordTable.appendChild(row);
            alert("Record Saved!");
        }else{
            alert("Save Error: "+res.msg);
        }
    });
});

// ---------- Print Slip ----------
document.getElementById("printBtn").addEventListener("click", ()=>{
    window.print();
});
</script>
</body>
</html>
